<div class="container">
  <h2>{{ isEditMode ? 'Edit' : 'Add' }} Employee</h2>

  <!-- Add #employeeForm="ngModel" to access the form state -->
  <form #employeeForm="ngForm" (ngSubmit)="employeeForm.valid && onSubmit()">


    <!-- First Name -->
    <div class="form-group">
      <label>First Name</label>
      <input type="text"
             [(ngModel)]="employee.firstName"
             name="firstName"
             #firstName="ngModel"
             required
             minlength="2"
             class="form-control"
             [class.is-invalid]="firstName.invalid && firstName.touched">

      <!-- Error Messages -->
      <div class="error-message" *ngIf="firstName.invalid && firstName.touched">
        <small *ngIf="firstName.errors?.['required']">First name is required</small>
        <small *ngIf="firstName.errors?.['minlength']">First name must be at least 2 characters</small>
      </div>
    </div>

    <!-- Last Name -->
    <div class="form-group">
      <label>Last Name</label>
      <input type="text"
             [(ngModel)]="employee.lastName"
             name="lastName"
             #lastName="ngModel"
             required
             minlength="2"
             class="form-control"
             [class.is-invalid]="lastName.invalid && lastName.touched">

      <div class="error-message" *ngIf="lastName.invalid && lastName.touched">
        <small *ngIf="lastName.errors?.['required']">Last name is required</small>
        <small *ngIf="lastName.errors?.['minlength']">Last name must be at least 2 characters</small>
      </div>
    </div>

    <!-- Email -->
    <div class="form-group">
      <label>Email</label>
      <input type="email"
             [(ngModel)]="employee.email"
             name="email"
             #email="ngModel"
             required
             email
             class="form-control"
             [class.is-invalid]="email.invalid && email.touched">

      <div class="error-message" *ngIf="email.invalid && email.touched">
        <small *ngIf="email.errors?.['required']">Email is required</small>
        <small *ngIf="email.errors?.['email']">Please enter a valid email address</small>
      </div>
    </div>

    <!-- Department -->
    <div class="form-group">
      <label>Department</label>
      <input type="text"
             [(ngModel)]="employee.department"
             name="department"
             #department="ngModel"
             required
             minlength="2"
             class="form-control"
             [class.is-invalid]="department.invalid && department.touched">

      <div class="error-message" *ngIf="department.invalid && department.touched">
        <small *ngIf="department.errors?.['required']">Department is required</small>
        <small *ngIf="department.errors?.['minlength']">Department must be at least 2 characters</small>
      </div>
    </div>

    <!-- Buttons -->
    <div class="button-group">
      <button type="submit"
              class="btn btn-success"
              [disabled]="employeeForm.invalid">
        Save
      </button>
      <a routerLink="/" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
