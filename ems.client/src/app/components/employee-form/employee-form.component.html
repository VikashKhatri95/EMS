<div class="container">
  <h2>{{ isEditMode ? 'Edit' : 'Add' }} Employee</h2>
  <form (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label>First Name</label>
      <input type="text" [(ngModel)]="employee.firstName" name="firstName" required>
    </div>
    <div class="form-group">
      <label>Last Name</label>
      <input type="text" [(ngModel)]="employee.lastName" name="lastName" required>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" [(ngModel)]="employee.email" name="email" required>
    </div>
    <div class="form-group">
      <label>Department</label>
      <input type="text" [(ngModel)]="employee.department" name="department" required>
    </div>
    <button type="submit" class="btn btn-success">Save</button>
    <a routerLink="/" class="btn btn-secondary">Cancel</a>
  </form>
</div>
