<div class="container">
  <h2>Employee List</h2>
  <a routerLink="/add" class="btn btn-primary">Add New Employee</a>

  <table class="table" *ngIf="employees.length > 0">
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Department</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let emp of employees">
        <td>{{ emp.id }}</td>
        <td>{{ emp.firstName }} {{ emp.lastName }}</td>
        <td>{{ emp.email }}</td>
        <td>{{ emp.department }}</td>
        <td>
          <a [routerLink]="['/edit', emp.id]" class="btn btn-sm btn-warning">Edit</a>
          <button (click)="deleteEmployee(emp.id)" class="btn btn-sm btn-danger">Delete</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
